name: Build APK

on:
  push:
    branches:
      - sivaji
      - pranay
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.0' # Matching pubspec.yaml sdk
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          cd apps/mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd apps/mobile_app
          flutter build apk --release --no-codesign
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: apk-release
          path: apps/mobile_app/build/app/outputs/flutter-apk/app-release.apk
