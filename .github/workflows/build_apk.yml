name: Build APK

on:
  push:
    branches:
      - sivaji
      - pranay
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: List Files (Debug)
        run: ls -R
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed specific version to use latest stable
          
      - name: Install dependencies
        run: |
          cd apps/mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd apps/mobile_app
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4 # Upgraded to v4
        with:
          name: apk-release
          path: apps/mobile_app/build/app/outputs/flutter-apk/app-release.apk
